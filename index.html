<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Porra Mundial de Verticales - NIVEL 4 LIVE</title>

<style>

:root{
    --oro:#ffd700;
    --plata:#c0c0c0;
    --bronce:#cd7f32;
    --fondo:rgba(0,0,0,0.78);
    --verde:#00ff88;
    --rojo:#ff4d4d;
    --azul:#4da3ff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Segoe UI,Arial,sans-serif;
    color:white;

    background:
        linear-gradient(rgba(0,0,0,.85),rgba(0,0,0,.85)),
        url('https://images.unsplash.com/photo-1459865264687-c49fa049e84d');

    background-size:cover;
    background-position:center;
    background-attachment:fixed;
}

/* HEADER BROADCAST */

header{
    text-align:center;
    padding:40px 20px 20px;
    background:linear-gradient(135deg,rgba(0,0,0,.95),rgba(0,20,60,.95));
    border-bottom:4px solid var(--oro);
}

h1{
    font-size:3rem;
    letter-spacing:2px;
}

.live{
    display:inline-block;
    margin-top:10px;
    padding:6px 14px;
    background:var(--rojo);
    border-radius:20px;
    font-weight:bold;
    animation:blink 1s infinite;
}

@keyframes blink{
    0%,100%{opacity:1;}
    50%{opacity:.2;}
}

/* CONTENEDOR */

.container{
    width:min(1200px,95%);
    margin:auto;
}

/* RANKING PRINCIPAL */

.board{
    margin-top:20px;
    background:var(--fondo);
    padding:20px;
    border-radius:18px;
    backdrop-filter:blur(12px);
}

.title{
    text-align:center;
    font-size:2rem;
    color:var(--oro);
    margin-bottom:15px;
}

/* ROWS */

.row{
    display:flex;
    justify-content:space-between;
    padding:16px;
    margin-bottom:10px;
    border-radius:12px;
    background:rgba(255,255,255,.08);
    transition:.3s;
    font-size:1.2rem;
}

.row:hover{
    transform:scale(1.01);
}

.first{background:linear-gradient(135deg,#ffd700,#fff6ba); color:black; font-weight:bold;}
.second{background:linear-gradient(135deg,#c0c0c0,#eee); color:black; font-weight:bold;}
.third{background:linear-gradient(135deg,#cd7f32,#f0c39a); color:black; font-weight:bold;}

/* MOVIMIENTO TIPO REPLAY */

.up{
    border-left:6px solid var(--verde);
    animation:upMove .6s;
}

.down{
    border-left:6px solid var(--rojo);
    animation:downMove .6s;
}

@keyframes upMove{
    0%{transform:translateY(10px); filter:brightness(1.5);}
    100%{transform:translateY(0);}
}

@keyframes downMove{
    0%{transform:translateY(-10px); filter:brightness(1.5);}
    100%{transform:translateY(0);}
}

/* CARDS */

.card{
    margin:20px 0;
    background:var(--fondo);
    padding:18px;
    border-radius:14px;
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:12px;
}

.box{
    background:rgba(255,255,255,.08);
    padding:12px;
    border-radius:10px;
}

/* CHART */

canvas{
    width:100%;
    height:100px;
    margin-top:10px;
    background:rgba(255,255,255,.05);
    border-radius:10px;
}

</style>
</head>

<body>

<header>
    <h1>🏆 PORRA MUNDIAL DE VERTICALES</h1>
    <div class="live">🔴 LIVE BROADCAST</div>
</header>

<div class="container">

    <div class="board">
        <div class="title">📊 Clasificación en Directo</div>
        <div id="board"></div>
    </div>

    <div id="cards"></div>
	<div class="clasificacion"></div>

</div>

<script>
/* ==========================================
   RANKING POR EQUIPOS Y JUGADORES
========================================== */

function crearRankingGlobal(data){

    const contenedor = document.querySelector(".clasificacion");
    if(!contenedor) return;

    const equipos = {};
    const jugadores = {};

    data.forEach(p=>{

        for(let i=1;i<=5;i++){
            const equipo = p["Equipo "+i];
            const puntos = Number(p["Puntos Equipo "+i] || 0);

            if(equipo){
                equipos[equipo] = (equipos[equipo] || 0) + puntos;
            }
        }

        for(let i=1;i<=5;i++){
            const jugador = p["Jugador "+i];
            const puntos = Number(p["Puntos Jugador "+i] || 0);

            if(jugador){
                jugadores[jugador] = (jugadores[jugador] || 0) + puntos;
            }
        }
    });

    contenedor.innerHTML = `
    <div style="
        margin-top:30px;
        background:rgba(255,255,255,.08);
        padding:15px;
        border-radius:12px;
    ">
        <h3 style="color:#ffd700;text-align:center;">
            📊 Clasificación general equipos y jugadores (procesado)
        </h3>
        <p style="text-align:center;opacity:0.7;margin-top:10px;">
            (Este bloque ya no muestra rankings separados)
        </p>
    </div>`;
}

const URL =
"https://script.google.com/macros/s/AKfycbwfWIbX_ye0snlmrGVOl_pJAl6jIkdxN9QdREFjDLo-hPR1e1rYia2EKen1aaJl_mJvJA/exec";

/* ESTADO GLOBAL */
let state = JSON.parse(localStorage.getItem("state") || "{}");
let history = JSON.parse(localStorage.getItem("history") || "{}");
let last = null;

/* SAVE */
function save(){
    localStorage.setItem("state", JSON.stringify(state));
    localStorage.setItem("history", JSON.stringify(history));
}

/* HISTORIAL */
function pushHistory(name, value){

    if(!history[name]) history[name] = [];

    history[name].push(value);

    if(history[name].length > 25){
        history[name].shift();
    }
}

/* CLASIFICACION */

function rankClass(i){
    if(i===0) return "row first";
    if(i===1) return "row second";
    if(i===2) return "row third";
    return "row";
}

/* MOVIMIENTO INTELIGENTE */

function motion(p){

    const old = state[p.Participante];

    if(old === undefined) return "";

    if(p.TotalPuntos > old) return "up";
    if(p.TotalPuntos < old) return "down";

    return "";
}

/* RENDER BOARD */

function renderBoard(data){

    const el = document.getElementById("board");
    el.innerHTML="";

    data.forEach((p,i)=>{

        const div = document.createElement("div");

        div.className = rankClass(i) + " " + motion(p);

        div.innerHTML = `
            <div>🏅 ${i+1}. ${p.Participante}</div>
            <div><b>${p.TotalPuntos}</b> pts</div>
        `;

        el.appendChild(div);
    });
}

/* GRAFICO */

function draw(canvas, points){

    const ctx = canvas.getContext("2d");

    const w = canvas.width;
    const h = canvas.height;

    ctx.clearRect(0,0,w,h);

    if(points.length < 2) return;

    const max = Math.max(...points);
    const min = Math.min(...points);
    const range = max - min || 1;

    ctx.strokeStyle = "#4da3ff";
    ctx.lineWidth = 2;

    ctx.beginPath();

    points.forEach((v,i)=>{

        const x = (i/(points.length-1))*w;
        const y = h - ((v-min)/range)*h;

        if(i===0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);

    });

    ctx.stroke();
}

/* CARDS */

function renderCards(data){

    const el = document.getElementById("cards");
    el.innerHTML="";

    data.forEach(p=>{

        pushHistory(p.Participante, p.TotalPuntos);

        const div = document.createElement("div");
        div.className="card";

        div.innerHTML=`
            <h3>${p.Participante} — ${p.TotalPuntos} pts</h3>

            <div class="grid">

                <div class="box">
                    <h4>⚽ Equipos</h4>
                    <div>${p["Equipo 1"]||""}</div>
                    <div>${p["Equipo 2"]||""}</div>
                    <div>${p["Equipo 3"]||""}</div>
                    <div>${p["Equipo 4"]||""}</div>
                    <div>${p["Equipo 5"]||""}</div>
                </div>

                <div class="box">
                    <h4>⭐ Jugadores</h4>
                    <div>${p["Jugador 1"]||""}</div>
                    <div>${p["Jugador 2"]||""}</div>
                    <div>${p["Jugador 3"]||""}</div>
                    <div>${p["Jugador 4"]||""}</div>
                    <div>${p["Jugador 5"]||""}</div>
                </div>

            </div>

            <canvas></canvas>
        `;

        el.appendChild(div);

        const canvas = div.querySelector("canvas");
        canvas.width = canvas.offsetWidth;
        canvas.height = 100;

        draw(canvas, history[p.Participante] || []);
    });
}

/* DETECTOR CAMBIOS REAL */

function changed(data){

    if(!last) return true;

    return JSON.stringify(data) !== JSON.stringify(last);
}

/* LOAD ENGINE */

async function load(){

    const r = await fetch(URL);
    const d = await r.json();

    const data = d.participantes;

    data.sort((a,b)=>b.TotalPuntos-a.TotalPuntos);

    if(!changed(data)) return;

    renderBoard(data);
    renderCards(data);
	crearRankingGlobal(data);

    data.forEach(p=>{
        state[p.Participante] = p.TotalPuntos;
    });

    last = JSON.parse(JSON.stringify(data));

    save();
}

/* LOOP LIVE */

load();
setInterval(load,10000);

</script>

</body>
</html>
