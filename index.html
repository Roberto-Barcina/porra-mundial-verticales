<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Clasificación Porra Mundial</title>
<style>
    body { font-family: Arial; background: #f4f4f4; padding: 20px; }
    h1 { text-align: center; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
    th { background: #333; color: white; }
    tr:nth-child(even) { background: #f9f9f9; }
    .pos { font-weight: bold; }
</style>
</head>
<body>

<h1>Clasificación</h1>

<table id="tabla">
    <thead>
        <tr>
            <th>Posición</th>
            <th>Participante</th>
            <th>Puntos</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
fetch("https://script.google.com/macros/s/AKfycbwfWIbX_ye0snlmrGVOl_pJAl6jIkdxN9QdREFjDLo-hPR1e1rYia2EKen1aaJl_mJvJA/exec")
  .then(r => r.json())
  .then(data => {
      const participantes = data.participantes;

      // Ordenar por TotalPuntos de mayor a menor
      participantes.sort((a, b) => b.TotalPuntos - a.TotalPuntos);

      const tbody = document.querySelector("#tabla tbody");
      tbody.innerHTML = "";

      participantes.forEach((p, i) => {
          const fila = `
              <tr>
                  <td class="pos">${i + 1}</td>
                  <td>${p.Participante}</td>
                  <td>${p.TotalPuntos}</td>
              </tr>
          `;
          tbody.innerHTML += fila;
      });
  });
</script>

</body>
</html>
